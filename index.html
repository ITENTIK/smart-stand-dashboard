<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☕ Умная подставка</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            background: #f5f5f5;
            color: #1f1a16;
        }
        body.dark {
            background: #1a1a1e;
            color: #e0dcd8;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
        }
        .theme-toggle {
            background: #ddd;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        body.dark .theme-toggle {
            background: #333;
            color: #eee;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .card {
            background: white;
            padding: 16px 18px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        body.dark .card {
            background: #2a2a2e;
            border-color: #3a3a3e;
        }
        .card .label {
            font-size: 14px;
            color: #888;
        }
        body.dark .card .label {
            color: #aaa;
        }
        .card .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
        }
        .status-ok {
            color: #2a9d8f;
        }
        .status-no {
            color: #e76f51;
        }

        .notifications {
            background: #e8e8e8;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border-left: 5px solid #aaa;
            transition: background 0.5s, border-color 0.5s;
            min-height: 56px;
            display: flex;
            align-items: center;
        }
        body.dark .notifications {
            background: #2a2a2e;
            border-left-color: #555;
        }
        .notifications.alarm {
            background: #ffebee !important;
            border-left-color: #e76f51 !important;
            animation: blink-bg 0.8s infinite alternate;
        }
        body.dark .notifications.alarm {
            background: #4a1a1a !important;
            border-left-color: #ff6b4a !important;
        }
        @keyframes blink-bg {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.01);
            }
        }
        .notifications .msg {
            font-size: 17px;
            font-weight: 500;
        }
        .notifications .msg .highlight {
            color: #e76f51;
            font-weight: 700;
        }

        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 16px;
        }
        body.dark .chart-container {
            background: #2a2a2e;
            border-color: #3a3a3e;
        }
        .chart-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }
        .chart-controls button {
            background: #ddd;
            border: none;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        body.dark .chart-controls button {
            background: #3a3a3e;
            color: #eee;
        }
        .chart-controls button.active {
            background: #2a9d8f;
            color: white;
        }

        .chart-grid {
            display: grid;
            gap: 15px;
        }
        .chart-grid.one {
            grid-template-columns: 1fr;
        }
        .chart-grid.two {
            grid-template-columns: 1fr 1fr;
        }
        .chart-grid .chart-box {
            min-height: 240px;
        }
        @media (max-width: 600px) {
            .chart-grid.two {
                grid-template-columns: 1fr;
            }
            .chart-grid .chart-box {
                min-height: 280px;
            }
            .cards {
                grid-template-columns: 1fr 1fr;
            }
            .card .value {
                font-size: 18px;
            }
            .card .label {
                font-size: 12px;
            }
            .notifications .msg {
                font-size: 15px;
            }
            h1 {
                font-size: 20px;
            }
            .theme-toggle {
                font-size: 14px;
                padding: 6px 14px;
            }
            .card {
                padding: 12px 14px;
            }
            .chart-container {
                padding: 12px;
            }
        }

        .history {
            background: white;
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        body.dark .history {
            background: #2a2a2e;
            border-color: #3a3a3e;
        }
        .history h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #555;
        }
        body.dark .history h3 {
            color: #aaa;
        }
        .history ul {
            list-style: none;
            padding: 0;
            max-height: 160px;
            overflow-y: auto;
            font-size: 14px;
        }
        .history ul li {
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }
        body.dark .history ul li {
            border-bottom-color: #3a3a3e;
        }
        .history .time {
            color: #999;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>☕ Умная подставка</h1>
        <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
    </div>

    <div class="cards">
        <div class="card"><div class="label">🌡️ Температура</div><div class="value" id="temp">—</div></div>
        <div class="card"><div class="label">⚖️ Вес</div><div class="value" id="weight">—</div></div>
        <div class="card"><div class="label">🍵 Кружка</div><div class="value" id="cup">—</div></div>
        <div class="card"><div class="label">⏱️ Осталось</div><div class="value" id="timeLeft">—</div></div>
        <div class="card"><div class="label">🔋 Батарея</div><div class="value" id="battery">—</div></div>
    </div>

    <div class="notifications" id="notifBox">
        <div class="msg" id="notifMsg">📌 Ожидание... поставьте кружку</div>
    </div>

    <div class="chart-container">
        <div class="chart-controls">
            <button id="viewOne" class="active">📊 Один график</button>
            <button id="viewTwo">📈 Два графика</button>
        </div>
        <div class="chart-grid one" id="chartGrid">
            <div class="chart-box" id="boxCombined"><canvas id="chartCombined"></canvas></div>
            <div class="chart-box" id="boxTemp" style="display:none;"><canvas id="chartTemp"></canvas></div>
            <div class="chart-box" id="boxWeight" style="display:none;"><canvas id="chartWeight"></canvas></div>
        </div>
    </div>

    <div class="history">
        <h3>📋 История показаний</h3>
        <ul id="historyList">
            <li style="color:#aaa;">Нет данных</li>
        </ul>
    </div>

    <div class="footer">🔄 Данные обновляются в реальном времени</div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
